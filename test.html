<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Helpdesk Cards · Status with Check Mark Icon</title>
    <!-- modern font for cleaner UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #eef2f9 0%, #e2e8f0 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* card container – clean helpdesk panel */
        .helpdesk-panel {
            max-width: 1320px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        /* header area */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
        }
        .title-section h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0f172a, #2d3a5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title-section p {
            color: #475569;
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }
        .badge-date {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* card-items exact grid: grid-4 gap-6 mt-6 */
        .card-items {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;    /* gap-6 (24px) */
            margin-top: 1.5rem; /* mt-6 */
        }

        /* helpdesk-card design – modern, soft, interactive */
        .helpdesk-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.2rem 1rem 1.2rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.01);
            border: 1px solid rgba(255,255,255,0.6);
            cursor: default;
        }

        .helpdesk-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.18);
            border-color: rgba(99, 102, 241, 0.3);
            background: #fefefe;
        }

        /* svg icon wrapper */
        .icon-wrapper {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .helpdesk-card:hover .icon-wrapper {
            background: rgba(16, 185, 129, 0.12);
            transform: scale(1.02);
        }

        /* specific hover effect for solved card (check icon) */
        .helpdesk-card:nth-child(3):hover .icon-wrapper {
            background: rgba(16, 185, 129, 0.18);
        }

        .card-info {
            flex: 1;
        }
        .card-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5b6e8c;
            margin-bottom: 0.25rem;
        }
        .card-info .count-number {
            font-size: 2.3rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        /* extra dynamic accent line */
        .helpdesk-card {
            position: relative;
        }
        .helpdesk-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 1rem;
            right: 1rem;
            height: 3px;
            background: linear-gradient(90deg, #c084fc, #4f46e5, #10b981);
            border-radius: 3px;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .helpdesk-card:hover::after {
            transform: scaleX(1);
        }

        /* responsive */
        @media (max-width: 850px) {
            .card-items {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
        }
        @media (max-width: 550px) {
            .card-items {
                grid-template-columns: 1fr;
            }
            .helpdesk-panel {
                padding: 1rem;
            }
            .card-info .count-number {
                font-size: 1.8rem;
            }
        }

        /* micro footnote */
        .footnote {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            background: #f1f5f9;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
<div class="helpdesk-panel">
    <div class="panel-header">
        <div class="title-section">
            <h2>📊 Ticket tracker</h2>
            <p>Real‑time status · Clean SVG icons · Check mark solved</p>
        </div>
        <div class="badge-date">⚡ last sync: just now</div>
    </div>

    <!-- card-items grid with gap-6 mt-6 (exact requested structure) -->
    <div class="card-items grid-4 gap-6 mt-6">

        <!-- 1. NEW CARD (with fresh + icon) -->
        <div class="helpdesk-card">
            <div class="icon-wrapper">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4V20M20 12H4" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="9" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2 2"/>
                    <path d="M12 8V12L14 14" stroke="#4f46e5" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="card-info">
                <h4>NEW</h4>
                <span class="count-number">12</span>
            </div>
        </div>

        <!-- 2. IN PROGRESS CARD (sync / progress arrows) -->
        <div class="helpdesk-card">
            <div class="icon-wrapper">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4" stroke="#eab308" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M12 2V6L16 2L12 2Z" fill="#eab308" stroke="#ca8a04" stroke-width="1.2"/>
                    <path d="M16 8L20 12L16 16" stroke="#eab308" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="2" fill="#fef08a" stroke="#ca8a04" stroke-width="1.2"/>
                </svg>
            </div>
            <div class="card-info">
                <h4>IN PROGRESS</h4>
                <span class="count-number">12</span>
            </div>
        </div>

        <!-- 3. SOLVED CARD
             ★★★ EXACT CHECK MARK ICON (as requested) ★★★
             original SVG exactly as provided: green check inside circle, double ring & filled circle accent -->
        <div class="helpdesk-card">
            <div class="icon-wrapper">
                <!-- provided check mark icon (perfect match) -->
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" stroke="#10b981" stroke-width="1.8" fill="none"/>
    <path d="M8 12L11 15L16 9" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
            </div>
            <div class="card-info">
                <h4>SOLVED</h4>
                <span class="count-number">24</span>   <!-- dynamic count: solved tickets often higher -->
            </div>
        </div>

        <!-- 4. CANCELLED CARD (X mark + warning style) -->
        <div class="helpdesk-card">
            <div class="icon-wrapper">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="9" stroke="#f87171" stroke-width="1.5"/>
                    <path d="M12 8V12M12 16H12.01" stroke="#dc2626" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="card-info">
                <h4>CANCELLED</h4>
                <span class="count-number">5</span>
            </div>
        </div>
    </div>

    <div class="footnote">
        ✅ Solved card uses exact check mark SVG (double ring & inner green check) • other statuses with coherent icons
    </div>
</div>
</body>
</html>
